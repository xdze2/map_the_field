<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map the Field</title>
  <!-- marked.js for markdown rendering -->
  <script src="marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      flex-shrink: 0;
    }
    #back-btn {
      display: none;
      background: none;
      border: none;
      color: #a0b0ff;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    #back-btn:hover { color: #fff; }
    #topbar-title { font-weight: 700; font-size: 13px; color: #a0b0ff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #flask-status { font-size: 10px; color: transparent; flex-shrink: 0; }
    #flask-status.err { color: #e57373; }

    /* ── LIST TOOLBAR ── */
    #list-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #13151f;
      border-bottom: 1px solid #2a2d3a;
      flex-shrink: 0;
    }
    #list-toolbar select {
      flex: 1;
      background: #1e2130;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
    }
    #count { font-size: 11px; color: #555; white-space: nowrap; }

    /* ── VIEWS ── */
    #list-view  { flex: 1; overflow-y: auto; }
    #node-view  { flex: 1; overflow-y: auto; display: none; padding: 12px 10px 0; }

    /* ── BOTTOM BAR (node view only) ── */
    #node-bottom {
      display: none;
      flex-direction: column;
      flex-shrink: 0;
      border-top: 1px solid #2a2d3a;
      background: #13151f;
    }
    #rank-bar { display: flex; gap: 4px; padding: 8px 8px 4px; height: 90px; }
    #nav-bar  { display: flex; }
    .nav-btn {
      flex: 1;
      background: #1a1d27;
      border: none;
      border-top: 1px solid #2a2d3a;
      color: #c0c8e0;
      font-size: 20px;
      padding: 10px 0;
      cursor: pointer;
      line-height: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .nav-btn:first-child { border-right: 1px solid #2a2d3a; }
    .nav-btn:hover:not(:disabled) { background: #252840; color: #fff; }
    .nav-btn:disabled { color: #333; cursor: default; }
    #nav-counter {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #444;
      pointer-events: none;
      bottom: 6px;
    }

    /* ── NODE ROW ── */
    .node-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #1e2130;
      cursor: pointer;
      transition: background 0.1s;
    }
    .node-row:hover { background: #1a1d2e; }

    .rank-badge {
      width: 22px; height: 22px;
      border-radius: 50%;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .rank-none { background: #2a2d3a; color: #555; }
    .rank-1    { background: #4a1010; color: #ff6b6b; }
    .rank-2    { background: #3a2a10; color: #ffaa44; }
    .rank-3    { background: #2a2a2a; color: #888; }
    .rank-4    { background: #1a2a1a; color: #88cc88; }
    .rank-5    { background: #1a2a4a; color: #66aaff; }
    .rank-6    { background: #2a1a4a; color: #cc88ff; }

    .node-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .node-meta-col { font-size: 10px; color: #555; white-space: nowrap; }

    /* ── NODE VIEW ── */
    .node-header { margin-bottom: 12px; }
    .node-title  { font-size: 15px; font-weight: 700; color: #e0e0e0; margin-bottom: 4px; }
    .node-submeta { font-size: 11px; color: #666; }

    /* Rank buttons */
    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #555; margin: 14px 0 6px; }
    .rank-buttons { display: flex; gap: 4px; }

    /* Summary */
    .summary-box {
      background: #13151f;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      padding: 10px;
      margin-top: 4px;
    }
    .summary-box.rendered { cursor: default; }
    .summary-rendered { line-height: 1.55; color: #ccc; }
    .summary-rendered h1 { font-size: 14px; color: #e0e0e0; margin: 0 0 8px; }
    .summary-rendered h2 { font-size: 12px; color: #a0b0ff; text-transform: uppercase; letter-spacing: 0.04em; margin: 12px 0 4px; }
    .summary-rendered p  { margin-bottom: 6px; font-size: 12px; }
    .summary-rendered ul { padding-left: 16px; margin-bottom: 6px; }
    .summary-rendered li { font-size: 12px; margin-bottom: 3px; }
    .summary-rendered a  { color: #66aaff; text-decoration: none; }
    .summary-rendered a:hover { text-decoration: underline; }
    .summary-rendered code { background: #1e2130; padding: 1px 4px; border-radius: 3px; font-size: 11px; }

    /* Sources */
    .source-item { padding: 6px 0; border-bottom: 1px solid #1e2130; font-size: 11px; color: #888; }
    .source-item:last-child { border-bottom: none; }
    .source-url { color: #66aaff; word-break: break-all; }

    /* History */
    .history-item {
      padding: 5px 0;
      border-bottom: 1px solid #1e2130;
      font-size: 11px;
      color: #666;
    }
    .history-item:last-child { border-bottom: none; }
    .history-rank { font-weight: 700; color: #aaa; }
    .history-ts   { color: #444; font-size: 10px; }
    .history-note { color: #999; margin-top: 2px; }

    /* Capture button */
    #capture-btn {
      display: none;
      background: #2a3a5a;
      border: 1px solid #3a5a8a;
      color: #88bbff;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #capture-btn:hover { background: #3a4a7a; }
    #capture-btn.capturing { color: #888; cursor: default; }

    /* Rank icon buttons */
    .rank-btn {
      flex: 1;
      padding: 4px 2px;
      border: 2px solid transparent;
      border-radius: 6px;
      background: #1e2130;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .rank-btn:hover { border-color: #444; background: #252840; }
    .rank-btn[data-rank="1"].active { border-color: #ff6b6b; background: #4a1010; }
    .rank-btn[data-rank="2"].active { border-color: #ffaa44; background: #3a2a10; }
    .rank-btn[data-rank="3"].active { border-color: #888;    background: #2a2a2a; }
    .rank-btn[data-rank="4"].active { border-color: #88cc88; background: #1a2a1a; }
    .rank-btn[data-rank="5"].active { border-color: #66aaff; background: #1a2a4a; }
    .rank-btn[data-rank="6"].active { border-color: #cc88ff; background: #2a1a4a; }
    .rank-btn { display: flex; align-items: center; justify-content: center; }
    .rank-icon { display: block; width: 100%; height: 100%; object-fit: contain; }

    /* Summary edit controls */
    .summary-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 4px;
    }
    .summary-btn {
      background: #1e2130;
      border: 1px solid #333;
      color: #aaa;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    .summary-btn:hover { background: #252840; color: #ddd; }
    .summary-btn.primary { background: #1a3a5a; border-color: #3a6a9a; color: #88bbff; }
    .summary-btn.primary:hover { background: #2a4a6a; }
    #summary-textarea {
      width: 100%;
      min-height: 220px;
      background: #0d0f18;
      color: #ccc;
      border: 1px solid #2a2d3a;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
      line-height: 1.5;
    }
    #summary-textarea:focus { outline: none; border-color: #4a6aaa; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a3a2a;
      border: 1px solid #2a6a3a;
      color: #88cc88;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Empty / loading */
    .empty-msg { padding: 24px 16px; text-align: center; color: #555; font-size: 12px; }
  </style>
</head>
<body>

  <div id="topbar">
    <button id="back-btn" title="Back to list">←</button>
    <span id="topbar-title">Map the Field</span>
    <span id="flask-status" title="Flask not reachable">●</span>
    <button id="capture-btn" title="Capture current tab into this node">⬇ Capture</button>
  </div>
  <div id="toast"></div>

  <!-- list toolbar — hidden when in node view -->
  <div id="list-toolbar">
    <select id="sort-select">
      <option value="unranked">Unranked first</option>
      <option value="rank_desc">Rank ↓ (best first)</option>
      <option value="rank_asc">Rank ↑ (worst first)</option>
      <option value="updated">Recently updated</option>
    </select>
    <span id="count">—</span>
  </div>

  <div id="list-view">
    <div class="empty-msg">Loading…</div>
  </div>

  <div id="node-view"></div>

  <div id="node-bottom">
    <div id="rank-bar"></div>
    <div id="nav-bar" style="position:relative;">
      <button id="prev-btn" class="nav-btn" title="Previous node">&lt; prev</button>
      <span id="nav-counter"></span>
      <button id="next-btn" class="nav-btn" title="Next node">next &gt;</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
