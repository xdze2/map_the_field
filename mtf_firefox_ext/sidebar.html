<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Map the Field</title>
    <link rel="stylesheet" href="codemirror.min.css" />
    <script src="codemirror.min.js"></script>
    <script src="codemirror-markdown.min.js"></script>
    <script src="marked.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: monospace;
        font-size: 14px;
        background: #1b1b1b;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── TOP BAR ── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        background: #202020;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
        min-height: 32px;
      }
      #back-btn {
        display: none;
        background: none;
        border: none;
        color: #ddd;
        cursor: pointer;
        font-size: 13px;
        font-family: monospace;
        padding: 0 4px;
        line-height: 1;
        flex-shrink: 0;
      }
      #back-btn:hover {
        color: #fff;
      }

      #topbar-title {
        font-weight: 700;
        font-size: 12px;
        color: #fff;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: monospace;
      }
      #topbar-title.node-id {
        font-weight: 400;
        font-size: 11px;
        color: #b8b8b8;
      }

      #flask-status {
        font-size: 10px;
        color: transparent;
        flex-shrink: 0;
      }
      #flask-status.err {
        color: #f66;
      }

      #capture-url {
        display: none;
        font-size: 10px;
        color: #969b78;
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
        flex-shrink: 1;
      }
      #capture-btn {
        display: none;
        background: #191a13;
        border: 1px solid #555;
        color: #969b78;
        padding: 2px 7px;
        font-size: 11px;
        font-family: monospace;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      #capture-btn:hover {
        border-color: #c2c4b6;
        color: #c2c4b6;
      }
      #capture-btn.capturing {
        color: #444;
        border-color: #333;
        cursor: default;
      }

      /* ── LIST TOOLBAR ── */
      #list-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        background: #202020;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }
      #list-toolbar select {
        flex: 1;
        background: #000;
        color: #aaa;
        border: 1px solid #333;
        padding: 2px 4px;
        font-size: 11px;
        font-family: monospace;
      }
      #count {
        font-size: 10px;
        color: #444;
        white-space: nowrap;
      }

      /* ── VIEWS ── */
      #list-view {
        flex: 1;
        overflow-y: auto;
      }
      #node-view {
        flex: 1;
        overflow-y: auto;
        display: none;
        padding: 8px 8px 0;
      }

      /* ── BOTTOM BAR ── */
      #node-bottom {
        display: none;
        flex-direction: column;
        flex-shrink: 0;
        border-top: 1px solid #333;
        background: #202020;
      }
      #rank-bar {
        display: flex;
        gap: 3px;
        padding: 5px 5px 2px;
      }
      #nav-bar {
        display: flex;
      }

      .nav-btn {
        flex: 1;
        background: #000;
        border: none;
        border-top: 1px solid #333;
        color: #aaa;
        font-size: 12px;
        font-family: monospace;
        padding: 6px 0;
        cursor: pointer;
        line-height: 1;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nav-btn:first-child {
        border-right: 1px solid #333;
      }
      .nav-btn:hover:not(:disabled) {
        color: #fff;
      }
      .nav-btn:disabled {
        color: #333;
        cursor: default;
      }
      #nav-counter {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        font-family: monospace;
        color: #707070;
        pointer-events: none;
        bottom: 4px;
      }

      /* ── RANK BUTTONS ── */
      .rank-btn {
        flex: 1;
        padding: 3px 2px;
        border: 1px solid #333;
        background: #000;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .rank-btn:hover {
        border-color: #888;
        background-color: #4d4d4d;
      }
      .rank-icon {
        display: block;
        width: 64px;
        height: 64px;
        /* object-fit: contain; */
        opacity: 0.8;
      }
      .rank-btn:hover .rank-icon {
        opacity: 1;
      }
      .rank-btn.active .rank-icon {
        opacity: 1;
      }
      .rank-num {
        display: none;
      }
      .rank-label {
        font-size: 8px;
        font-family: monospace;
        color: #838383;
        text-align: center;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      .rank-btn:hover .rank-num {
        color: #ddd;
      }
      .rank-btn:hover .rank-label {
        color: #888;
      }
      .rank-btn.active {
        border-color: #fff;
        background-color: #2a2a2a;
      }
      .rank-btn.active .rank-num {
        color: #fff;
      }
      .rank-btn.active .rank-label {
        color: #ccc;
      }

      /* ── NODE ROW (list) ── */
      .node-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-bottom: 1px solid #111;
        cursor: pointer;
      }
      .node-row:hover {
        background: #111;
      }

      .rank-badge {
        width: 30px;
        font-size: 11px;
        font-weight: 700;
        font-family: monospace;
        color: #555;
        flex-shrink: 0;
        text-align: center;
      }
      .rank-none {
        color: #333;
      }
      .rank-1 {
        color: #f66;
      }
      .rank-2 {
        color: #fa0;
      }
      .rank-3 {
        color: #777;
      }
      .rank-4 {
        color: #8c8;
      }
      .rank-5 {
        color: #6af;
      }
      .rank-6 {
        color: #c8f;
      }

      .node-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12px;
        font-family: monospace;
      }
      .node-meta-col {
        font-size: 10px;
        color: #444;
        white-space: nowrap;
        font-family: monospace;
      }

      /* ── SECTION LABELS ── */
      .section-label {
        font-size: 10px;
        color: #a7a7a7;
        margin: 12px 0 5px;
        font-family: monospace;
      }
      .section-label::before {
        content: "-- ";
      }
      .section-label::after {
        content: " --";
      }
      .section-label-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 12px 0 5px;
      }
      .section-label-row .section-label {
        margin: 0;
      }
      .refresh-btn {
        background: none;
        border: none;
        color: #a3a3a3;
        cursor: pointer;
        font-size: 12px;
        font-family: monospace;
        padding: 0 2px;
        line-height: 1;
      }
      .refresh-btn:hover {
        color: #dfdfdf;
      }

      /* ── SUMMARY: rendered view ── */
      .summary-rendered {
        line-height: 1.5;
        color: #ccc;
        padding: 2px 0;
        font-family: monospace;
        font-size: 12px;
      }
      .summary-rendered h1 {
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        margin: 0 0 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid #333;
      }
      .summary-rendered h2 {
        font-size: 11px;
        font-weight: 700;
        color: #dbdbdb;
        margin: 12px 0 4px;
      }
      .summary-rendered h2::before {
        content: "## ";
        color: #444;
      }
      .summary-rendered h3 {
        font-size: 12px;
        color: #aaa;
        margin: 8px 0 3px;
      }
      .summary-rendered h3::before {
        content: "### ";
        color: #868686;
      }
      .summary-rendered p {
        margin-bottom: 6px;
      }
      .summary-rendered ul,
      .summary-rendered ol {
        padding-left: 16px;
        margin-bottom: 6px;
      }
      .summary-rendered li {
        margin-bottom: 2px;
      }
      .summary-rendered a {
        color: #6af;
        text-decoration: none;
      }
      .summary-rendered a:hover {
        text-decoration: underline;
      }
      .summary-rendered strong {
        color: #fff;
      }
      .summary-rendered code {
        background: #111;
        padding: 1px 4px;
        border: 1px solid #333;
        font-size: 11px;
        font-family: monospace;
        color: #ccc;
      }
      .summary-rendered hr {
        border: none;
        border-top: 1px solid #333;
        margin: 8px 0;
      }

      /* ── SUMMARY: edit toolbar ── */
      .summary-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 5px;
        margin-bottom: 4px;
      }
      .summary-btn {
        background: #000;
        border: 1px solid #333;
        color: #888;
        padding: 2px 8px;
        font-size: 11px;
        font-family: monospace;
        cursor: pointer;
      }
      .summary-btn:hover {
        border-color: #888;
        color: #ddd;
      }
      .summary-btn.primary {
        border-color: #888;
        color: #ddd;
      }
      .summary-btn.primary:hover {
        border-color: #fff;
        color: #fff;
      }

      /* ── CODEMIRROR terminal theme ── */
      .CodeMirror {
        background: #111;
        color: #ddd;
        border: 1px solid #333;
        font-family: monospace;
        font-size: 12px;
        line-height: 1.5;
        height: auto;
        min-height: 160px;
        padding: 4px 0;
      }
      .CodeMirror-scroll {
        min-height: 160px;
      }
      .CodeMirror-cursor {
        border-left-color: #fff;
      }
      .CodeMirror-selected {
        background: #222 !important;
      }
      .cm-s-default .cm-header   { color: #fff; font-weight: bold; }
      .cm-s-default .cm-header-1 { font-size: 1.1em; }
      .cm-s-default .cm-header-2 { color: #bbb; }
      .cm-s-default .cm-strong   { color: #fff; font-weight: bold; }
      .cm-s-default .cm-em       { color: #bbb; font-style: italic; }
      .cm-s-default .cm-link     { color: #6af; text-decoration: none; }
      .cm-s-default .cm-url      { color: #6af; }
      .cm-s-default .cm-quote    { color: #777; font-style: italic; }
      .cm-s-default .cm-hr       { color: #444; }
      .cm-s-default .cm-keyword  { color: #ddd; }
      .cm-s-default .cm-atom     { color: #ddd; }
      .cm-s-default .cm-number   { color: #ddd; }
      .cm-s-default .cm-def      { color: #ddd; }
      .cm-s-default .cm-variable-2 { color: #ddd; }
      .cm-s-default .cm-comment  { color: #666; }
      .cm-s-default .cm-string   { color: #ddd; }
      .cm-s-default .cm-string-2 { color: #ddd; }
      .cm-s-default .cm-meta     { color: #888; }
      .cm-s-default .cm-tag      { color: #bbb; }
      .cm-s-default .cm-attribute { color: #ddd; }
      .cm-s-default .cm-error    { color: #f66; }

      /* ── SOURCES ── */
      .sources-list {
        margin-top: 2px;
      }
      .source-item {
        padding: 4px 0;
        border-bottom: 1px solid #111;
        font-size: 11px;
        font-family: monospace;
        color: #555;
      }
      .source-item:last-child {
        border-bottom: none;
      }
      .source-url {
        color: #6af;
        word-break: break-all;
      }
      .source-url:hover {
        text-decoration: underline;
      }

      /* ── HISTORY ── */
      .history-list {
        margin-top: 2px;
        margin-bottom: 12px;
      }
      .history-item {
        padding: 4px 0;
        border-bottom: 1px solid #111;
        font-size: 11px;
        font-family: monospace;
        color: #cecece;
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .history-rank {
        font-weight: 700;
        color: #aaa;
      }
      .history-ts {
        color: #444;
        font-size: 10px;
      }
      .history-note {
        color: #888;
        margin-top: 2px;
      }

      /* ── TOAST ── */
      #toast {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: #000;
        border: 1px solid #555;
        color: #ddd;
        padding: 4px 12px;
        font-size: 11px;
        font-family: monospace;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 100;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
      }

      .empty-msg {
        padding: 20px 12px;
        color: #bbbbbb;
        font-size: 11px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <button id="back-btn" title="Back to list">←</button>
      <span id="topbar-title">Map the Field</span>
      <span id="flask-status" title="Flask not reachable">●</span>
      <span id="capture-url"></span>
      <button id="capture-btn" title="Capture current tab into this node">
        ⬇ Capture
      </button>
    </div>
    <div id="toast"></div>

    <div id="list-toolbar">
      <select id="sort-select">
        <option value="unranked">Unranked first</option>
        <option value="rank_desc">Rank ↓ (best first)</option>
        <option value="rank_asc">Rank ↑ (worst first)</option>
        <option value="updated">Recently updated</option>
      </select>
      <span id="count">—</span>
    </div>

    <div id="list-view">
      <div class="empty-msg">Loading…</div>
    </div>

    <div id="node-view"></div>

    <div id="node-bottom">
      <div id="rank-bar"></div>
      <div id="nav-bar" style="position: relative">
        <button id="prev-btn" class="nav-btn" title="Previous node">
          &lt; prev
        </button>
        <span id="nav-counter"></span>
        <button id="next-btn" class="nav-btn" title="Next node">
          next &gt;
        </button>
      </div>
    </div>

    <script src="sidebar.js"></script>
  </body>
</html>
